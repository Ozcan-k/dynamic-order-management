server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Vite-hashed assets are content-addressed → safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Always revalidate the SPA entry document
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Socket.io WebSocket — MUST be declared before the regex proxy block
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived realtime scan events
        proxy_read_timeout 7d;
        proxy_send_timeout 7d;
    }

    # Backend API routes — mirrors vite.config.ts proxyRoutes.
    # Browser page navigations (Accept: text/html) fall through to the SPA,
    # mirroring the Vite dev-server `bypass` callback so /sales, /picker-admin,
    # /reports etc. still load the React app on full-page navigation/refresh.
    location ~ ^/(auth|users|orders|assign|reports|health|picker-admin|packer-admin|picker|packer|outbound|archive|sales|marketing|stock|products|warehouses)(/|$) {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }

    # SPA fallback — any other path serves index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
